[package]
name = "escapement"
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/wilfreddenton/escapement"
description = "A durable, self-re-arming event listener for Claude Code agents — no more lost wakeups"
keywords = ["claude-code", "mcp", "agents", "ai", "hook"]
categories = ["command-line-utilities", "asynchronous"]
readme = "README.md"

[features]
# The Stop hook is the primitive, and the lightest piece — a sensible default.
default = ["hook"]
hook = ["dep:reqwest", "reqwest/blocking", "dep:rustls", "dep:clap"]
bus = [
    "dep:axum",
    "dep:hyper",
    "dep:hyper-util",
    "dep:tower-service",
    "dep:tokio-rustls",
    "dep:rcgen",
    "dep:dashmap",
    "dep:tokio",
    "dep:tracing",
    "dep:tracing-subscriber",
    "dep:clap",
]
mcp = ["dep:rmcp", "dep:schemars", "dep:reqwest", "dep:rustls", "dep:tokio", "dep:clap"]
full = ["hook", "bus", "mcp"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"

clap = { version = "4", features = ["derive", "env"], optional = true }
tokio = { version = "1", features = ["full"], optional = true }
tracing = { version = "0.1", optional = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }

axum = { version = "0.8", optional = true }
hyper = { version = "1", features = ["server", "http1", "http2"], optional = true }
hyper-util = { version = "0.1", features = ["server", "server-auto", "tokio"], optional = true }
tower-service = { version = "0.3", optional = true }
tokio-rustls = { version = "0.26", default-features = false, features = ["ring", "logging", "tls12"], optional = true }
rcgen = { version = "0.14", optional = true }
dashmap = { version = "6", optional = true }

reqwest = { version = "0.13", default-features = false, features = ["json", "query", "rustls-no-provider"], optional = true }
rustls = { version = "0.23", default-features = false, features = ["ring", "std"], optional = true }

rmcp = { version = "2", features = ["server", "transport-io", "macros"], optional = true }
schemars = { version = "1", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }

[[bin]]
name = "escapement-bus"
path = "src/bin/escapement-bus.rs"
required-features = ["bus"]

[[bin]]
name = "escapement-hook"
path = "src/bin/escapement-hook.rs"
required-features = ["hook"]

# The flagship demo: two agents conversing. Never published as its own crate.
[[bin]]
name = "duet"
path = "src/bin/duet.rs"
required-features = ["mcp"]
