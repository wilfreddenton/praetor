name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (all features)
        run: cargo clippy --all-targets --all-features
      - name: Test (all features)
        run: cargo test --all-features
      - name: Build release (full)
        run: cargo build --release --features full

  # Feature-gated code only compiles under the right cfg. Without this, a typo in
  # a #[cfg(feature = "...")] passes locally and breaks for anyone using a
  # different feature set.
  features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack
      - name: Check every feature combination
        run: cargo hack --feature-powerset --no-dev-deps check
